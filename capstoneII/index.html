<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkansas Movie Database</title>
    <meta name="author" content="Aric Allen">
    <link rel="stylesheet" href="assets/style/capstoneII.css">
</head>
<body>

    <section class="page">
        <header class="header">
            <h1>Arkansas Movie Database</h1>
            <p>Search Arkansas-related movies or actors</p>
        </header>

        <div class="search-bar">
            <input
                type="text"
                id="searchInput"
                placeholder="Search Arkansas-related movies or actors"
            >
            <button id="searchBtn">Search</button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="button-row">
            <button id="loadFeaturedBtn">Load Arkansas Featured Titles</button>
        </div>

        <div class="movie-grid" id="movieGrid">
            <!-- Search results go here -->
        </div>
    </section>

    <section class="page hidden" id="movieDetailSection">
        <header class="header">
            <h1>Movie Detail Page</h1>
        </header>

        <div class="detail-layout" id="movieDetailContent">
            <!-- Movie details go here -->
        </div>
    </section>

    <section class="page hidden" id="actorDetailSection">
        <header class="header">
            <h1>Actor Profile Page</h1>
        </header>

        <div class="detail-layout" id="actorDetailContent">
            <!-- Actor details go here -->
        </div>
    </section>

    <script src="assets/js/app.js"></script>
</body>
</html>
